name: NodeAgent CI

on:
  pull_request:
  repository_dispatch:
    types:
      - docs-contract-changed

permissions:
  actions: read
  contents: read

jobs:
  test:
    runs-on:
      group: livemask-ci
      labels: [self-hosted, linux, livemask, docker, ci]
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: |
          if [[ ! -f go.mod ]]; then
            echo "go.mod not found; scaffold repository, skip Go tests."
            exit 0
          fi
          go test ./...

  notify-lark:
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Lark
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
          LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
          WORKFLOW_RESULT: ${{ needs.test.result }}
        run: bash .github/scripts/lark-notify.sh "$WORKFLOW_RESULT"
